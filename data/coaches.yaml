- name: "Vando Becheli"
  title: "Program Director & Head Coach"
  bio: "120+ wins at the collegiate level, including a Region XVIII championship and third-place NJCAA national finish. 25 years of professional playing and coaching experience on multiple continents."
  image: "/images/basketball-assistant-coach-fort-walton-beach-fcp-sports.jpg"
  credentials:
    - "120+ Collegiate Coaching Wins"
    - "NJCAA National Finalist"
    - "25 Years Professional Experience"

- name: "Kenny Anderson"
  title: "Mentor & Guest Clinician"
  bio: "NBA legend — 1991 second overall pick, 14-year NBA career, 1994 NBA All-Star. Runs monthly clinics at FCP Sports sharing elite-level skill development and decision-making with Emerald Coast athletes."
  image: "/images/kenny-anderson-nba-veteran-basketball-trainer-fort-walton-beach.jpg"
  credentials:
    - "14-Year NBA Career"
    - "1994 NBA All-Star"
    - "1991 NBA Draft 2nd Overall Pick"

- name: "Jared Dugan"
  title: "Skills & Development Coach"
  bio: "Specializes in guard development, ball handling, and shooting mechanics. Works with athletes across all age groups from elementary through high school level."
  image: "/images/basketball-skills-coach-jared-dugan-fcp-sports.jpg"
  credentials:
    - "Guard Development Specialist"
    - "Shooting Mechanics Coach"
    - "Youth Development Certified"

- name: "Mario Webb"
  title: "Player Development Coach"
  bio: "Focuses on positional training, post play, and athlete conditioning. Brings competitive playing experience to every session at FCP Sports."
  image: "/images/basketball-development-coach-mario-webb-fcp-sports.jpg"
