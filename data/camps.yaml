# Camp catalog — single source of truth for camp registration.
# Drives the register form, camp pages, /camps/ hub, and schedule.
#
# Summer 2026 structure: every week runs TWO camps (morning + afternoon).
# Morning = K–5 focus, Afternoon = grades 6–12 focus. Both $149/week.
# Families can register for one or both (both = $298).
# Little Hoopers Mini is the only K–2 half-day camp (no afternoon).
#
# Flat pricing — no tiered early-bird/regular/late. One price per camp.
#
# Field reference:
#   id              — URL slug (used in /register/?camp=<id>)
#   name            — display name on cards + form
#   summary         — one-line description under the name
#   session         — "AM" or "PM" (for weeks with two camps)
#   start_date      — ISO date (YYYY-MM-DD)
#   end_date        — ISO date
#   dates_display   — human-readable for cards ("June 1–5, 2026")
#   days            — "Mon–Fri", "Mon–Thu", "Tue–Thu"
#   times           — "9:30 AM – 1:00 PM"
#   hours           — "3.5 hours/day"
#   grades          — "K–5"
#   age_min         — int (for validation)
#   age_max         — int
#   price           — flat price
#   min_enrollment  — minimum kids for the week to run
#   detail_url      — /camps/<slug>/ for "View Details" button
#   active          — true/false (hide from register flow if false)
#   locked          — true if real enrollments exist (do not change dates/price)

