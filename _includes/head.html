<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{% if page.url == "/" %}FCP Sports | Elite Basketball Training in Fort Walton Beach{% elsif page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
{% if page.noindex %}<meta name="robots" content="noindex, nofollow">{% endif %}

<!-- Mobile -->
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page.url == '/' %}FCP Sports | Elite Basketball Training{% elsif page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:image" content="{% if page.og_image %}{{ page.og_image | absolute_url }}{% else %}{{ '/assets/images/og-default.jpg' | absolute_url }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta name="twitter:card" content="summary_large_image">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SportsOrganization",
  "name": "FCP Sports",
  "url": "https://fcpsports.org",
  "description": "{{ site.description }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "33 Jet Drive NW",
    "addressLocality": "Fort Walton Beach",
    "addressRegion": "FL",
    "postalCode": "32548",
    "addressCountry": "US"
  },
  "telephone": "+18509612323",
  "email": "info@fcpsports.org",
  "sport": "Basketball",
  "founder": {
    "@type": "Person",
    "name": "Lee DeForest",
    "jobTitle": "Founder & Head Coach"
  },
  "sameAs": [
    "{{ site.social.instagram }}",
    "{{ site.social.twitter }}",
    "{{ site.social.youtube }}",
    "{{ site.social.facebook }}",
    "{{ site.social.tiktok }}"
  ]
}
</script>

<!-- Fonts + CSS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
