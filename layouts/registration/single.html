{{ define "main" }}
<section class="pt-12 pb-20 bg-gray-50">
  <div class="max-w-2xl mx-auto px-4">
    <h1 class="font-display text-3xl text-navy text-center mb-8">Register for a Program</h1>
    <div class="bg-white rounded-2xl shadow-xl p-10">
      {{ partial "inquiry-form.html" (dict "tag" "general-inquiry") }}
    </div>
    <div class="grid grid-cols-3 gap-4 mt-8 text-center">
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="font-display text-2xl text-gold">24hr</div>
        <div class="text-xs text-gray-500 mt-1">Response Time</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="font-display text-2xl text-gold">Free</div>
        <div class="text-xs text-gray-500 mt-1">Consultation</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="font-display text-2xl text-gold">5★</div>
        <div class="text-xs text-gray-500 mt-1">Rated Coaches</div>
      </div>
    </div>
  </div>
</section>
{{ end }}
