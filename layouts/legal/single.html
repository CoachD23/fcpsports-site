{{ define "main" }}
<section class="py-24 bg-white">
  <div class="max-w-3xl mx-auto px-4">
    <nav class="text-sm text-gray-400 mb-8 flex gap-2">
      <a href="/" class="hover:text-gold">Home</a><span>/</span>
      <span class="text-gray-600">{{ .Title }}</span>
    </nav>
    <h1 class="font-display text-5xl text-navy mb-4 leading-none">{{ .Title }}</h1>
    <div class="prose prose-lg max-w-none prose-headings:font-display prose-headings:text-navy prose-h2:text-2xl prose-a:text-gold prose-strong:text-navy prose-table:block prose-table:overflow-x-auto prose-table:w-full mt-10">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
