{{ define "main" }}
<section class="min-h-screen bg-gray-50 flex items-center justify-center py-24 px-4">
  <div class="max-w-2xl mx-auto text-center">
    <div class="text-7xl mb-6">🎉</div>
    <h1 class="font-display text-6xl text-navy mb-4">YOU'RE ALL SET!</h1>
    <p class="text-gray-600 text-lg mb-10">Your free guide is heading to your inbox right now. While you wait — here's your next step:</p>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
      <a href="/registration/" class="card p-6 hover:-translate-y-1 transition-all duration-300 block">
        <div class="text-3xl mb-3">📋</div>
        <h3 class="font-display text-lg text-navy">Register Now</h3>
        <p class="text-gray-500 text-sm mt-1">Secure your spot in a program</p>
      </a>
      <a href="/services/basketball-camp/" class="card p-6 hover:-translate-y-1 transition-all duration-300 block">
        <div class="text-3xl mb-3">🏕️</div>
        <h3 class="font-display text-lg text-navy">View Camps</h3>
        <p class="text-gray-500 text-sm mt-1">See upcoming camp dates</p>
      </a>
      <a href="/contact/" class="card p-6 hover:-translate-y-1 transition-all duration-300 block">
        <div class="text-3xl mb-3">💬</div>
        <h3 class="font-display text-lg text-navy">Ask Us Anything</h3>
        <p class="text-gray-500 text-sm mt-1">Talk to a real coach</p>
      </a>
    </div>
    <a href="/" class="text-gold hover:underline text-sm">← Back to FCP Sports</a>
  </div>
</section>
<script>
  if (typeof gtag !== 'undefined') {
    gtag('event', 'guide_download', { event_category: 'lead', event_label: 'parent_guide' });
  }
</script>
{{ end }}
