{{ define "main" }}
<section class="bg-navy py-20 text-center">
  <div class="max-w-3xl mx-auto px-4">
    <span class="text-gold font-display tracking-widest text-sm uppercase">FCP Sports</span>
    <h1 class="font-display text-6xl text-white mt-2 mb-4">{{ .Title }}</h1>
    {{ with .Description }}<p class="text-white/70 text-lg">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-4">
    {{ if .Pages }}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="card group hover:-translate-y-1 transition-all duration-300 block">
        <div class="p-6">
          <p class="text-gold text-xs font-semibold uppercase tracking-wider mb-2">{{ .Date.Format "January 2, 2006" }}</p>
          <h2 class="font-display text-2xl text-navy mb-3 group-hover:text-gold transition-colors leading-tight">{{ .Title }}</h2>
          <p class="text-gray-500 text-sm leading-relaxed">{{ .Description }}</p>
          <span class="text-gold text-sm font-semibold mt-4 inline-block">Read More →</span>
        </div>
      </a>
      {{ end }}
    </div>
    {{ else }}
    <p class="text-center text-gray-500">No posts yet — check back soon.</p>
    {{ end }}
  </div>
</section>
{{ end }}
