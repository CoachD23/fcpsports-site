[build]
  publish = "public"
  command = "npm ci && hugo --minify"

[functions]
  directory = "netlify/functions"

[functions."camp-survey-day2"]
  schedule = "0 * * * *"

[build.environment]
  HUGO_VERSION = "0.157.0"
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' https: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://www.google.com https://www.gstatic.com https://connect.facebook.net https://js.authorize.net https://widgets.leadconnectorhq.com https://api.leadconnectorhq.com https://static.cloudflareinsights.com https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https:; frame-src https:; object-src 'none'; base-uri 'self';"

# Image CDN — auto-converts to WebP/AVIF based on Accept header
[images]
  remote_images = ["https://fcpsports.org/images/.*"]

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept"

[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/guides/*"
  to = "/camps/"
  status = 301

[[redirects]]
  from = "/schools/"
  to = "/"
  status = 301

[[redirects]]
  from = "/camps/elite-showcase/"
  to = "/camps/"
  status = 301

[[redirects]]
  from = "/camps/kenny-anderson-clinic/"
  to = "/camps/"
  status = 301

[[redirects]]
  from = "/services/summer-aau/"
  to = "/services/basketball-camp/"
  status = 301
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, stale-while-revalidate=86400"
