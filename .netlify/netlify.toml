functionsDirectory = "/Users/fcp/fcpsports/netlify/functions"
functionsDirectoryOrigin = "config"
headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[build]
publish = "/Users/fcp/fcpsports/public"
publishOrigin = "config"
commandOrigin = "config"
command = "npm ci && hugo --minify"
functions = "/Users/fcp/fcpsports/netlify/functions"

[build.environment]
HUGO_VERSION = "0.157.0"
NODE_VERSION = "20"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[images]
remote_images = ["https://fcpsports.org/images/.*"]

[functions]

[functions."*"]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Vary = "Accept"

[[headers]]
for = "/.netlify/images/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Vary = "Accept"

[[headers]]
for = "/videos/*"

[headers.values]
Cache-Control = "public, max-age=2592000"

[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
from = "/home"
to = "/"
status = 301.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]